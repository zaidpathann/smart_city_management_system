<!DOCTYPE html>
<html lang="en" ng-app="smartCityApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCity — Civic Portal</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Dynamic Navbar ── -->
  <nav class="navbar navbar-expand-lg sc-navbar" ng-controller="NavController">
    <div class="container-fluid px-4">
      <!-- Brand -->
      <a class="navbar-brand sc-brand" href="#/">
        <span class="brand-icon">🏙️</span>
        <span class="brand-text">SmartCity</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-1">

          <!-- Not logged in -->
          <li class="nav-item" ng-if="!isLoggedIn()">
            <a class="nav-link sc-navlink" href="#/"><i class="bi bi-house me-1"></i>Home</a>
          </li>
          <li class="nav-item" ng-if="!isLoggedIn()">
            <a class="btn sc-btn-outline ms-2" href="#/login"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
          </li>
          <li class="nav-item" ng-if="!isLoggedIn()">
            <a class="btn sc-btn-primary ms-2" href="#/register"><i class="bi bi-person-plus me-1"></i>Register</a>
          </li>

          <!-- Citizen logged in -->
          <li class="nav-item" ng-if="isLoggedIn() && !isAdmin()">
            <a class="nav-link sc-navlink" href="#/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
          </li>
          <li class="nav-item" ng-if="isLoggedIn() && !isAdmin()">
            <a class="nav-link sc-navlink" href="#/add-complaint"><i class="bi bi-chat-left-text me-1"></i>Complaint</a>
          </li>
          <li class="nav-item" ng-if="isLoggedIn() && !isAdmin()">
            <a class="nav-link sc-navlink" href="#/add-report"><i class="bi bi-trash3 me-1"></i>Report</a>
          </li>
          <li class="nav-item" ng-if="isLoggedIn() && !isAdmin()">
            <a class="nav-link sc-navlink" href="#/parking"><i class="bi bi-p-square me-1"></i>Parking</a>
          </li>
          <li class="nav-item" ng-if="isLoggedIn() && !isAdmin()">
            <a class="nav-link sc-navlink" href="#/emergency"><i class="bi bi-telephone-fill me-1"></i>Emergency</a>
          </li>

          <!-- Admin logged in -->
          <li class="nav-item" ng-if="isAdmin()">
            <a class="nav-link sc-navlink" href="#/admin"><i class="bi bi-shield-check me-1"></i>Admin Panel</a>
          </li>
          <li class="nav-item" ng-if="isAdmin()">
            <a class="nav-link sc-navlink" href="#/admin/announcements"><i class="bi bi-megaphone me-1"></i>Announcements</a>
          </li>
          <li class="nav-item" ng-if="isAdmin()">
            <a class="nav-link sc-navlink" href="#/admin/parking"><i class="bi bi-p-square me-1"></i>Parking</a>
          </li>

          <!-- User pill -->
          <li class="nav-item ms-2" ng-if="isLoggedIn()">
            <div class="sc-user-pill">
              <span class="pill-avatar">{{getInitial()}}</span>
              <span class="pill-name">{{getUserName()}}</span>
            </div>
          </li>
          <li class="nav-item" ng-if="isLoggedIn()">
            <button class="btn sc-btn-danger ms-2" ng-click="logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page Views (ng-view) ── -->
  <main class="sc-main">
    <div ng-view></div>
  </main>

  <!-- ── Footer ── -->
  <footer class="sc-footer">
    <div class="container text-center">
      <p class="mb-0">
        <span class="footer-brand">SmartCity Civic Portal</span>
        &nbsp;·&nbsp; Built with ❤️ for better communities
        &nbsp;·&nbsp; &copy; 2025
      </p>
    </div>
  </footer>

  <!-- Toast Notification -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="scToast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="scToastMsg">Message here</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

  <!-- App Modules -->
  <script src="js/app.js"></script>
  <script src="js/services/authService.js"></script>
  <script src="js/services/apiService.js"></script>
  <script src="js/controllers/NavController.js"></script>
  <script src="js/controllers/AuthController.js"></script>
  <script src="js/controllers/DashboardController.js"></script>
  <script src="js/controllers/ComplaintController.js"></script>
  <script src="js/controllers/AdminController.js"></script>
  <script src="js/controllers/ParkingController.js"></script>
  <script src="js/controllers/MiscController.js"></script>
</body>
</html>
