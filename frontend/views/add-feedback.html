<!-- ── Submit Feedback ── -->
<div class="sc-form-wrap" style="max-width:600px">
  <div class="sc-form-card">
    <div class="mb-4">
      <a href="#/dashboard" style="color:var(--text-muted);font-size:0.82rem"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <h2 class="sc-form-title mt-2">Submit Feedback</h2>
      <p class="sc-form-sub">Share your suggestions and experiences with the city administration.</p>
    </div>

    <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
    <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

    <form ng-submit="submitFeedback()">
      <!-- Star Rating -->
      <div class="mb-3">
        <label class="form-label">Overall Rating *</label>
        <div style="font-size:1.8rem;cursor:pointer;line-height:1">
          <span ng-repeat="s in stars" ng-click="setRating(s)"
                style="color:{{feedback.rating >= s ? '#d29922' : 'var(--border)'}};transition:color 0.15s;margin-right:4px">★</span>
        </div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem">
          {{feedback.rating}}/5 stars selected
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Subject *</label>
        <input type="text" class="form-control" ng-model="feedback.subject"
               placeholder="e.g. Suggestion for road maintenance" required />
      </div>

      <div class="mb-4">
        <label class="form-label">Your Message *</label>
        <textarea class="form-control" ng-model="feedback.message" rows="5"
                  placeholder="Share your thoughts, suggestions or appreciation..." required></textarea>
      </div>

      <button type="submit" class="btn-sc-primary" ng-disabled="loading">
        <span ng-if="!loading"><i class="bi bi-envelope-check me-2"></i>Submit Feedback</span>
        <span ng-if="loading"><i class="bi bi-arrow-repeat me-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i>Sending...</span>
      </button>
    </form>
  </div>
</div>
