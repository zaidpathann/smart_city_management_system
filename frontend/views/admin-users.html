<!-- ── Admin: User Management ── -->
<div class="sc-dashboard">
  <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-2">
    <div>
      <h1 class="sc-page-title">👥 User Management</h1>
      <p class="sc-page-sub">All registered citizens and administrators</p>
    </div>
    <a href="#/admin" class="btn sc-btn-outline"><i class="bi bi-arrow-left me-1"></i>Admin Panel</a>
  </div>

  <div class="sc-spinner" ng-if="loading">Loading users...</div>

  <div class="sc-empty" ng-if="!loading && users.length === 0">
    <i class="bi bi-people"></i><p>No users registered yet.</p>
  </div>

  <div class="sc-card" ng-if="!loading && users.length > 0">
    <div class="table-responsive">
      <table class="sc-table">
        <thead>
          <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Action</th></tr>
        </thead>
        <tbody>
          <tr ng-repeat="u in users">
            <td style="font-family:var(--font-mono);color:var(--text-dim);font-size:0.75rem">{{$index + 1}}</td>
            <td>
              <div style="display:flex;align-items:center;gap:0.5rem">
                <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#000;flex-shrink:0">
                  {{u.name.charAt(0).toUpperCase()}}
                </div>
                <span style="font-weight:600;font-size:0.88rem">{{u.name}}</span>
              </div>
            </td>
            <td style="color:var(--text-muted);font-size:0.84rem">{{u.email}}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">{{u.phone || '—'}}</td>
            <td>
              <span class="sc-badge" ng-class="u.role==='admin' ? 'badge-high' : 'badge-available'">
                {{u.role}}
              </span>
            </td>
            <td style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);white-space:nowrap">{{formatDate(u.createdAt)}}</td>
            <td>
              <button class="btn-sc-sm btn-sc-delete" ng-click="deleteUser(u._id)" ng-if="u.role!=='admin'">
                <i class="bi bi-trash3"></i> Delete
              </button>
              <span ng-if="u.role==='admin'" style="font-size:0.75rem;color:var(--text-dim)">Protected</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
