<!-- ── Add Cleanliness Report ── -->
<div class="sc-form-wrap" style="max-width:600px">
  <div class="sc-form-card">
    <div class="mb-4">
      <a href="#/dashboard" style="color:var(--text-muted);font-size:0.82rem"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <h2 class="sc-form-title mt-2">Report Cleanliness Issue</h2>
      <p class="sc-form-sub">Report garbage, open drains, or sanitation problems in your area.</p>
    </div>

    <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
    <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

    <form ng-submit="submitReport()">
      <div class="mb-3">
        <label class="form-label">Issue Category *</label>
        <select class="form-select" ng-model="report.category">
          <option ng-repeat="cat in categories" value="{{cat}}">{{cat}}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Location / Area *</label>
        <input type="text" class="form-control" ng-model="report.location"
               placeholder="e.g. Near Gandhi Chowk, Ward 5" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Description *</label>
        <textarea class="form-control" ng-model="report.description" rows="4"
                  placeholder="Describe what you observed and the extent of the problem" required></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label">Photo Evidence <small style="color:var(--text-dim)">(recommended)</small></label>
        <label class="sc-file-label" for="reportImg">
          <i class="bi bi-camera"></i>
          Upload a photo of the issue
        </label>
        <input type="file" id="reportImg" style="display:none" accept="image/*"
               onchange="angular.element(this).scope().onFileSelect(this)" />
        <img ng-if="imagePreview" ng-src="{{imagePreview}}" class="img-preview" alt="Preview" />
      </div>

      <button type="submit" class="btn-sc-primary" ng-disabled="loading">
        <span ng-if="!loading"><i class="bi bi-flag me-2"></i>Submit Report</span>
        <span ng-if="loading"><i class="bi bi-arrow-repeat me-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i>Submitting...</span>
      </button>
    </form>
  </div>
</div>
