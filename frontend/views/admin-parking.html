<!-- ── Admin: Parking Management ── -->
<div class="sc-dashboard">
  <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-2">
    <div>
      <h1 class="sc-page-title">🅿️ Parking Management</h1>
      <p class="sc-page-sub">Add and manage parking locations visible to citizens</p>
    </div>
    <a href="#/admin" class="btn sc-btn-outline"><i class="bi bi-arrow-left me-1"></i>Admin Panel</a>
  </div>

  <div class="row g-4">
    <!-- Add Form -->
    <div class="col-lg-4">
      <div class="sc-card">
        <div class="sc-card-header"><h3 class="sc-card-title"><i class="bi bi-plus-circle" style="color:var(--cyan)"></i> Add Location</h3></div>

        <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
        <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

        <form ng-submit="addParking()">
          <div class="mb-3">
            <label class="form-label">Location Name *</label>
            <input type="text" class="form-control" ng-model="parking.name" placeholder="e.g. Central Mall Parking" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Address *</label>
            <input type="text" class="form-control" ng-model="parking.address" placeholder="Full address" required />
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label">Total Slots *</label>
              <input type="number" class="form-control" ng-model="parking.totalSlots" min="1" required />
            </div>
            <div class="col-6">
              <label class="form-label">Available</label>
              <input type="number" class="form-control" ng-model="parking.availableSlots" min="0" />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Fee</label>
            <input type="text" class="form-control" ng-model="parking.fee" placeholder="e.g. ₹20/hr or Free" />
          </div>
          <div class="mb-4">
            <label class="form-label">Status</label>
            <select class="form-select" ng-model="parking.status">
              <option ng-repeat="s in statuses" value="{{s}}">{{s}}</option>
            </select>
          </div>
          <button type="submit" class="btn-sc-primary" ng-disabled="loading">
            <span ng-if="!loading"><i class="bi bi-plus-circle me-2"></i>Add Parking</span>
            <span ng-if="loading">Adding...</span>
          </button>
        </form>
      </div>
    </div>

    <!-- List -->
    <div class="col-lg-8">
      <div class="sc-card">
        <div class="sc-card-header"><h3 class="sc-card-title"><i class="bi bi-list-ul" style="color:var(--cyan)"></i> All Locations</h3></div>

        <div class="sc-empty" ng-if="parkings.length === 0">
          <i class="bi bi-p-square"></i><p>No parking locations added yet.</p>
        </div>

        <div class="table-responsive" ng-if="parkings.length > 0">
          <table class="sc-table">
            <thead>
              <tr><th>Name</th><th>Address</th><th>Slots</th><th>Fee</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              <tr ng-repeat="p in parkings">
                <td style="font-weight:600">{{p.name}}</td>
                <td style="color:var(--text-muted);font-size:0.8rem">{{p.address}}</td>
                <td style="font-family:var(--font-mono);font-size:0.85rem">
                  <span style="color:var(--green)">{{p.availableSlots}}</span><span style="color:var(--text-dim)">/{{p.totalSlots}}</span>
                </td>
                <td style="color:var(--text-muted);font-size:0.8rem">{{p.fee}}</td>
                <td><span class="sc-badge" ng-class="statusClass(p.status)">{{p.status}}</span></td>
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn-sc-sm btn-sc-info" ng-click="toggleStatus(p)">Toggle</button>
                    <button class="btn-sc-sm btn-sc-delete" ng-click="deleteParking(p._id)"><i class="bi bi-trash3"></i></button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
