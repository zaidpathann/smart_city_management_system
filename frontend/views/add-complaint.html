<!-- ── Add Complaint ── -->
<div class="sc-form-wrap" style="max-width:600px">
  <div class="sc-form-card">
    <div class="mb-4">
      <a href="#/dashboard" style="color:var(--text-muted);font-size:0.82rem"><i class="bi bi-arrow-left me-1"></i>Back to Dashboard</a>
      <h2 class="sc-form-title mt-2">File a Complaint</h2>
      <p class="sc-form-sub">Report a civic issue to the city administration.</p>
    </div>

    <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
    <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

    <form ng-submit="submitComplaint()">
      <div class="mb-3">
        <label class="form-label">Category *</label>
        <select class="form-select" ng-model="complaint.category">
          <option ng-repeat="cat in categories" value="{{cat}}">{{cat}}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Complaint Title *</label>
        <input type="text" class="form-control" ng-model="complaint.title"
               placeholder="Brief title of the issue" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Description *</label>
        <textarea class="form-control" ng-model="complaint.description" rows="4"
                  placeholder="Describe the issue in detail — location, severity, etc." required></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label">Upload Image <small style="color:var(--text-dim)">(optional)</small></label>
        <label class="sc-file-label" for="imgInput">
          <i class="bi bi-cloud-upload"></i>
          Click to upload photo (max 5MB · JPG, PNG, WebP)
        </label>
        <input type="file" id="imgInput" style="display:none" accept="image/*"
               onchange="angular.element(this).scope().onFileSelect(this)" />
        <img ng-if="imagePreview" ng-src="{{imagePreview}}" class="img-preview" alt="Preview" />
      </div>

      <button type="submit" class="btn-sc-primary" ng-disabled="loading">
        <span ng-if="!loading"><i class="bi bi-send me-2"></i>Submit Complaint</span>
        <span ng-if="loading"><i class="bi bi-arrow-repeat me-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i>Submitting...</span>
      </button>
    </form>
  </div>
</div>
