<!-- ── Login View ── -->
<div class="sc-form-wrap">
  <div class="sc-form-card">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🏙️</div>
      <h2 class="sc-form-title">Welcome back</h2>
      <p class="sc-form-sub">Sign in to your SmartCity account</p>
    </div>

    <div class="sc-alert sc-alert-error" ng-if="error">
      <i class="bi bi-exclamation-triangle-fill"></i> {{error}}
    </div>

    <form ng-submit="login()">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" ng-model="user.email"
               placeholder="you@example.com" required />
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" ng-model="user.password"
               placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn-sc-primary" ng-disabled="loading">
        <span ng-if="!loading"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span ng-if="loading"><i class="bi bi-arrow-repeat me-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i>Signing in...</span>
      </button>
    </form>

    <p class="text-center mt-3" style="font-size:0.85rem;color:var(--text-muted)">
      Don't have an account? <a href="#/register" style="color:var(--cyan)">Register here</a>
    </p>

    <!-- Demo hint -->
    <div class="sc-alert sc-alert-info mt-3" style="font-size:0.78rem">
      <i class="bi bi-info-circle"></i>
      <span><strong>Demo:</strong> Create an account to get started. Use role: <code>admin</code> for admin access.</span>
    </div>
  </div>
</div>
