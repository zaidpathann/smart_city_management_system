<!-- ── Register View ── -->
<div class="sc-form-wrap" style="max-width:540px">
  <div class="sc-form-card">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">👤</div>
      <h2 class="sc-form-title">Create Account</h2>
      <p class="sc-form-sub">Join the SmartCity civic platform</p>
    </div>

    <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
    <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

    <form ng-submit="register()">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-control" ng-model="user.name"
                 placeholder="Ravi Kumar" required />
        </div>

        <div class="col-12">
          <label class="form-label">Email Address *</label>
          <input type="email" class="form-control" ng-model="user.email"
                 placeholder="ravi@example.com" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" ng-model="user.phone"
                 placeholder="+91 9876543210" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select class="form-select" ng-model="user.role">
            <option value="user">Citizen (User)</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Password * <small style="color:var(--text-dim)">(min 6 characters)</small></label>
          <input type="password" class="form-control" ng-model="user.password"
                 placeholder="Choose a strong password" required />
        </div>

        <div class="col-12 mt-2">
          <button type="submit" class="btn-sc-primary" ng-disabled="loading">
            <span ng-if="!loading"><i class="bi bi-person-check me-2"></i>Create Account</span>
            <span ng-if="loading"><i class="bi bi-arrow-repeat me-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i>Creating...</span>
          </button>
        </div>
      </div>
    </form>

    <p class="text-center mt-3" style="font-size:0.85rem;color:var(--text-muted)">
      Already have an account? <a href="#/login" style="color:var(--cyan)">Sign in</a>
    </p>
  </div>
</div>
