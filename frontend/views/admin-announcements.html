<!-- ── Admin: Announcements ── -->
<div class="sc-dashboard">
  <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-2">
    <div>
      <h1 class="sc-page-title">📢 Announcements</h1>
      <p class="sc-page-sub">Post city-wide announcements visible to all citizens</p>
    </div>
    <a href="#/admin" class="btn sc-btn-outline"><i class="bi bi-arrow-left me-1"></i>Admin Panel</a>
  </div>

  <div class="row g-4">
    <!-- Post New -->
    <div class="col-lg-5">
      <div class="sc-card h-100">
        <div class="sc-card-header"><h3 class="sc-card-title"><i class="bi bi-plus-circle" style="color:var(--cyan)"></i> New Announcement</h3></div>

        <div class="sc-alert sc-alert-error"   ng-if="error">   <i class="bi bi-exclamation-triangle-fill"></i> {{error}} </div>
        <div class="sc-alert sc-alert-success" ng-if="success"> <i class="bi bi-check-circle-fill"></i> {{success}} </div>

        <form ng-submit="postAnnouncement()">
          <div class="mb-3">
            <label class="form-label">Priority</label>
            <select class="form-select" ng-model="ann.priority">
              <option ng-repeat="p in priorities" value="{{p}}">{{p}}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" ng-model="ann.title"
                   placeholder="Announcement headline" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Content *</label>
            <textarea class="form-control" ng-model="ann.content" rows="5"
                      placeholder="Full announcement text..." required></textarea>
          </div>
          <button type="submit" class="btn-sc-primary" ng-disabled="loading">
            <span ng-if="!loading"><i class="bi bi-megaphone me-2"></i>Post Announcement</span>
            <span ng-if="loading">Posting...</span>
          </button>
        </form>
      </div>
    </div>

    <!-- List -->
    <div class="col-lg-7">
      <div class="sc-card">
        <div class="sc-card-header"><h3 class="sc-card-title"><i class="bi bi-list-ul" style="color:var(--yellow)"></i> Posted Announcements</h3></div>

        <div class="sc-empty" ng-if="announcements.length === 0">
          <i class="bi bi-megaphone"></i><p>No announcements posted yet.</p>
        </div>

        <div class="ann-card" ng-class="'priority-' + a.priority" ng-repeat="a in announcements">
          <div class="d-flex align-items-start justify-content-between gap-2">
            <div style="flex:1;min-width:0">
              <div class="d-flex align-items-center gap-2 mb-1">
                <span class="sc-badge" ng-class="priorityClass(a.priority)">{{a.priority}}</span>
                <span class="ann-title">{{a.title}}</span>
              </div>
              <div class="ann-content">{{a.content}}</div>
              <div class="ann-meta">{{formatDate(a.createdAt)}}</div>
            </div>
            <button class="btn-sc-sm btn-sc-delete flex-shrink-0" ng-click="deleteAnnouncement(a._id)">
              <i class="bi bi-trash3"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
